version: '3.8'

# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Before running for the first time, get the SSL cert:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm certbot certonly \
#     --webroot --webroot-path=/var/www/certbot \
#     --email TU_EMAIL --agree-tos --no-eff-email \
#     -d tudominio.com -d www.tudominio.com

services:
  backend:
    ports: !reset []
    expose:
      - "8000"

  frontend:
    ports: !reset []
    expose:
      - "3000"
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://sebitass47.com/api/v1}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://sebitass47.com/api/v1}

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - friday-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    networks:
      - friday-network
