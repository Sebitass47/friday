version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-friday}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - friday-network

  redis:
    image: redis:7-alpine
    networks:
      - friday-network

  backend:
    build: ./backend
    # Port 8000 NOT exposed publicly — nginx proxies to it internally
    expose:
      - "8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-friday}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BPBsNmvev73BXocaeCN7Ey9-e4YnYoVe6jPM3eUtjDN0JrQVDLhk8RosHf3054Nq9xYQb0AfJJbxNQTgHvUxVC8}
      VAPID_CONTACT_EMAIL: ${VAPID_CONTACT_EMAIL:-sebastian.dlr47@gmail.com}
    depends_on:
      - postgres
      - redis
    networks:
      - friday-network

  celery-worker:
    build: ./backend
    command: celery -A app.celery_app.celery worker --loglevel=info --concurrency=2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-friday}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_CONTACT_EMAIL: ${VAPID_CONTACT_EMAIL:-sebastian.dlr47@gmail.com}
    depends_on:
      - postgres
      - redis
    networks:
      - friday-network

  celery-beat:
    build: ./backend
    command: celery -A app.celery_app.celery beat --loglevel=info
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-friday}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - friday-network

  frontend:
    build: ./frontend
    # Port 3000 NOT exposed publicly — nginx proxies to it internally
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    networks:
      - friday-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - friday-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Run manually with: docker compose run --rm certbot certonly ...
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:

networks:
  friday-network:
    driver: bridge
