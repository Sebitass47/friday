version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-friday}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - friday-network

  redis:
    image: redis:7-alpine
    networks:
      - friday-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REGISTRATION_SECRET: ${REGISTRATION_SECRET}
      REDIS_URL: redis://redis:6379/0
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_CONTACT_EMAIL: ${VAPID_CONTACT_EMAIL:-sebastian.dlr47@gmail.com}
    depends_on:
      - postgres
      - redis
    networks:
      - friday-network

  celery-worker:
    build: ./backend
    command: celery -A app.celery_app.celery worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_CONTACT_EMAIL: ${VAPID_CONTACT_EMAIL:-sebastian.dlr47@gmail.com}
    depends_on:
      - postgres
      - redis
    networks:
      - friday-network

  celery-beat:
    build: ./backend
    command: celery -A app.celery_app.celery beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - friday-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    networks:
      - friday-network

volumes:
  postgres_data:

networks:
  friday-network:
    driver: bridge
