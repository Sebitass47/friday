<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="currentColor" opacity="0.1"/>

  <!-- Growth bars (simplified for small sizes) -->
  <g transform="translate(256, 256)">
    <!-- Bar 1 -->
    <rect x="-90" y="-50" width="40" height="100" rx="20" fill="currentColor" opacity="0.7"/>

    <!-- Bar 2 -->
    <rect x="-20" y="-100" width="40" height="150" rx="20" fill="currentColor" opacity="0.85"/>

    <!-- Bar 3 -->
    <rect x="50" y="-150" width="40" height="200" rx="20" fill="currentColor"/>

    <!-- Base point -->
    <circle cx="0" cy="50" r="16" fill="currentColor"/>
  </g>
</svg>
