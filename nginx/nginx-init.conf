# Temporal HTTP-only config used ONLY for the first certbot certificate request.
# After getting the cert, switch to nginx.conf and restart.
server {
    listen 80;
    server_name TUDOMINIO.COM;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'FRIDAY - waiting for SSL setup';
        add_header Content-Type text/plain;
    }
}
